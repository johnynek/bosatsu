jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "run JVM tests"
        run: |
          sbt "coreJVM/testOnly * -- --log=failure; cli/testOnly * -- --log=failure; doc; paradox"
          ./test_cli.sh
    strategy:
      matrix:
        java:
          - '17'
    timeout-minutes: 30
  treeSitter:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "install tree-sitter cli"
        run: "npm install -g tree-sitter-cli@0.24.7"
      - name: "run tree-sitter and differential parser checks"
        run: "./scripts/test_tree_sitter.sh"
    strategy:
      matrix:
        java:
          - '17'
    timeout-minutes: 30
  proofChecks:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "run proof checks"
        run: "./scripts/check_proofs.sh"
    timeout-minutes: 30
  testPY:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "python setup"
        uses: "actions/setup-python@v2"
        with:
          python-version: "${{matrix.python}}"
      - name: "build assembly"
        run: 'sbt "cli/assembly"'
      - name: "generate python code"
        run: "./bosatsuj tool transpile --input_dir test_workspace/ --input test_workspace/Bosatsu/IO/Error.bosatsu --input test_workspace/Bosatsu/Collection/Array.bosatsu --input test_workspace/Bosatsu/IO/Core.bosatsu --input test_workspace/Bosatsu/IO/Bytes.bosatsu --input test_workspace/Bosatsu/IO/Std.bosatsu python --outdir pyout --externals test_workspace/Prog.bosatsu_externals --evaluators test_workspace/Prog.bosatsu_eval"
      - name: "run python tests"
        run: "PYTHONPATH=$PYTHONPATH:$(pwd)/test_workspace:$(pwd)/pyout python3 -m unittest discover pyout -v --pattern \"*.py\""
    strategy:
      matrix:
        java:
          - '17'
        python:
          - '3.9'
    timeout-minutes: 30
  testJS:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "run coreJS tests"
        run: |
          sbt "coreJS/testOnly * -- --log=failure; jsapiJS/testOnly * -- --log=failure"
          sbt "jsuiJS/testOnly * -- --log=failure"
      - name: "verify jsui browser bundle"
        run: |
          export NODE_OPTIONS=--openssl-legacy-provider
          sbt "jsuiJS/fullOptJS::webpack"
    strategy:
      matrix:
        java:
          - '17'
    timeout-minutes: 30
  testWithCoverageReport:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
        with:
          fetch-depth: 0
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "run tests with coverage"
        run: |
          sbt "coverage; clean; coreJVM/testOnly * -- --log=failure; cli/testOnly * -- --log=failure; coverageReport"
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        java:
          - '17'
    timeout-minutes: 30
  buildWithGraal:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "verify graalvm native image pin"
        run: |
          sbt -Dsbt.log.noformat=true "show cli / nativeImageJvm" "show cli / nativeImageVersion" | tee native-image-toolchain.txt
          grep -q "\[info\] graalvm-java23" native-image-toolchain.txt
          grep -q "\[info\] 23.0.2" native-image-toolchain.txt
      - name: "build native image"
        run: |
          sbt "cli/nativeImage"
          cp cli/target/native-image/bosatsu-cli bosatsu
      - name: "run bosatsu tests"
        run: |
          ./bosatsu tool test --input_dir test_workspace/ --input test_workspace/Bosatsu/IO/Error.bosatsu --input test_workspace/Bosatsu/Collection/Array.bosatsu --input test_workspace/Bosatsu/IO/Core.bosatsu --input test_workspace/Bosatsu/IO/Bytes.bosatsu --input test_workspace/Bosatsu/IO/Std.bosatsu
    strategy:
      matrix:
        java:
          - '17'
  testWithNode:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "build node"
        run: |
          sbt "cliJSJS/fullOptJS"
      - name: "run bosatsu tests"
        run: |
          ./bosatsu_node tool test --input_dir test_workspace/ --input test_workspace/Bosatsu/IO/Error.bosatsu --input test_workspace/Bosatsu/Collection/Array.bosatsu --input test_workspace/Bosatsu/IO/Core.bosatsu --input test_workspace/Bosatsu/IO/Bytes.bosatsu --input test_workspace/Bosatsu/IO/Std.bosatsu
      - name: "install c runtime"
        run: |
          export SHA=$(git rev-parse HEAD)
          export C_RUNTIME_ARCHIVE="${RUNNER_TEMP}/bosatsu-c-runtime-${SHA}.tar.gz"
          rm -f "$C_RUNTIME_ARCHIVE"
          tar -czf "$C_RUNTIME_ARCHIVE" c_runtime
          ./bosatsu_node c-runtime install --repo_root . --archive "$C_RUNTIME_ARCHIVE" --git_sha "$SHA" --profile release
      - name: "run test"
        run: |
          ./bosatsu_node fetch
          lib_eval_out=$(./bosatsu_node eval --repo_root . --name core_alpha --main Bosatsu/IO/CreateModeMain --run)
          echo "$lib_eval_out"
          echo "$lib_eval_out" | grep -q "create_mode_test:ok"
          tool_eval_out=$(./bosatsu_node tool eval --run --main Bosatsu/IO/CreateModeMain --input_all_subdir test_workspace)
          echo "$tool_eval_out"
          echo "$tool_eval_out" | grep -q "create_mode_test:ok"
          mkdir node_out_lib
          ./bosatsu_node test --outdir node_out_lib
          echo "now test without a given outdir"
          ./bosatsu_node test
      - name: "run build"
        run: |
          ./bosatsu_node build --main_pack Bosatsu/FibBench --exe_out fib_bench_node --cc_flag=-O0 --cc_lib=-lm
          ./fib_bench_node 10
    strategy:
      matrix:
        java:
          - '17'
  testC:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java:
          - '17'
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "build assembly"
        run: 'sbt "cli/assembly"'
      - name: "install vendored c runtime"
        run: |
          export SHA=$(./bosatsuj version -g)
          export C_RUNTIME_ARCHIVE="${RUNNER_TEMP}/bosatsu-c-runtime-${SHA}.tar.gz"
          rm -f "$C_RUNTIME_ARCHIVE"
          tar -czf "$C_RUNTIME_ARCHIVE" c_runtime
          CFLAGS="-O1 -g" CPPFLAGS="-DBSTS_CI=1" ./bosatsuj c-runtime install --repo_root . --archive "$C_RUNTIME_ARCHIVE" --git_sha "$SHA" --profile release
      - name: "test runtime code"
        run: |
          export SHA=$(./bosatsuj version -g)
          eval "$(python3 scripts/c_runtime_ci_env.py --sha "$SHA")"
          cd c_runtime
          rm -f test_exe
          CC="$C_RUNTIME_CC" make PROFILE=debug VENDORED_DEPS=1 CPPFLAGS="$C_RUNTIME_CPPFLAGS" LIBS="$C_RUNTIME_LIBS" CFLAGS="-O1 -g" && git diff --quiet || { git diff; false; }
          CC="$C_RUNTIME_CC" make boehm_example PROFILE=release VENDORED_DEPS=1 CPPFLAGS="$C_RUNTIME_CPPFLAGS" LIBS="$C_RUNTIME_LIBS" CFLAGS="-O1 -g"
          ./test_exe && ./boehm_example
          CC="$C_RUNTIME_CC" make bench_exe PROFILE=release VENDORED_DEPS=1 CPPFLAGS="$C_RUNTIME_CPPFLAGS" LIBS="$C_RUNTIME_LIBS" CFLAGS="-O1 -g"
          ./bench_exe 1000000 | tee bench_ci.txt
          cd ..
          python3 - <<'PY'
          import json
          import os
          import pathlib

          sha = os.environ["SHA"]
          conf_path = pathlib.Path(".bosatsuc") / sha / "cc_conf.json"
          conf = json.loads(conf_path.read_text())
          assert "-O1" in conf["flags"], conf
          assert "-DBSTS_CI=1" in conf["flags"] or "-DBSTS_CI=1" in conf["iflags"], conf
          print(f"validated {conf_path}")
          PY
      - name: "generate and compile c code"
        run: "./bosatsuj tool transpile --input_dir test_workspace/ --input test_workspace/Bosatsu/IO/Error.bosatsu --input test_workspace/Bosatsu/Collection/Array.bosatsu --input test_workspace/Bosatsu/IO/Core.bosatsu --input test_workspace/Bosatsu/IO/Bytes.bosatsu --input test_workspace/Bosatsu/IO/Std.bosatsu c --outdir c_out --test --exe_out test_exe --cc_flag=-O0 --cc_lib=-lm"
      - name: "run generated c code"
        run: ./c_out/test_exe
      - name: "check single assertion test output"
        run: |
          rm -rf issue1642_repro
          mkdir issue1642_repro
          cat > issue1642_repro/Foo.bosatsu <<'EOF'
          package Foo
          test = Assertion(True, "foo")
          EOF
          ./bosatsuj tool transpile --input issue1642_repro/Foo.bosatsu c --outdir issue1642_repro/out --test --exe_out test_exe --cc_flag=-O0 --cc_lib=-lm
          issue1642_repro/out/test_exe | tee issue1642_repro/output.txt
          grep -Eq '^Foo: [0-9]+\.[0-9]{3}s$' issue1642_repro/output.txt
          grep -Eq '^    passed: .*1' issue1642_repro/output.txt
      - name: "run test"
        run: |
          ./bosatsuj fetch
          mkdir c_out_lib
          ./bosatsuj test --outdir c_out_lib --cc_flag=-O0 --cc_lib=-lm
          echo "now test without a given outdir"
          ./bosatsuj test --cc_flag=-O0 --cc_lib=-lm
      - name: "run build"
        run: |
          mkdir c_out_build
          ./bosatsuj build --outdir c_out_build --main_pack Bosatsu/FibBench --exe_out fib_bench --cc_flag=-O0 --cc_lib=-lm
          ./c_out_build/fib_bench 10
          ./bosatsuj build --main_pack Bosatsu/FibBench --exe_out fib_bench_no_outdir --cc_flag=-O0 --cc_lib=-lm
          ./fib_bench_no_outdir 10
    timeout-minutes: 30
  testC-sanitizers:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java:
          - '17'
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "build assembly"
        run: 'sbt "cli/assembly"'
      - name: "run c sanitizer checks"
        run: "./scripts/test_c_sanitizers.sh"
    timeout-minutes: 60
  testC-valgrind:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java:
          - '17'
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "build assembly"
        run: 'sbt "cli/assembly"'
      - name: "install c toolchain and valgrind"
        run: "sudo apt-get update && sudo apt install -y valgrind"
      - name: "run c valgrind checks"
        run: "./scripts/test_c_valgrind.sh"
    timeout-minutes: 90
  testCMacOS:
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        java:
          - '17'
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "build assembly"
        run: 'sbt "cli/assembly"'
      - name: "install vendored c runtime"
        run: |
          export SHA=$(./bosatsuj version -g)
          export C_RUNTIME_ARCHIVE="${RUNNER_TEMP}/bosatsu-c-runtime-${SHA}.tar.gz"
          rm -f "$C_RUNTIME_ARCHIVE"
          tar -czf "$C_RUNTIME_ARCHIVE" c_runtime
          CFLAGS="-O1 -g" CPPFLAGS="-DBSTS_CI=1" ./bosatsuj c-runtime install --repo_root . --archive "$C_RUNTIME_ARCHIVE" --git_sha "$SHA" --profile release
      - name: "test runtime code"
        run: |
          export SHA=$(./bosatsuj version -g)
          eval "$(python3 scripts/c_runtime_ci_env.py --sha "$SHA")"
          cd c_runtime
          rm -f test_exe
          CC="$C_RUNTIME_CC" make PROFILE=debug VENDORED_DEPS=1 CPPFLAGS="$C_RUNTIME_CPPFLAGS" LIBS="$C_RUNTIME_LIBS" CFLAGS="-O1 -g" && git diff --quiet || { git diff; false; }
          CC="$C_RUNTIME_CC" make boehm_example PROFILE=release VENDORED_DEPS=1 CPPFLAGS="$C_RUNTIME_CPPFLAGS" LIBS="$C_RUNTIME_LIBS" CFLAGS="-O1 -g"
          ./test_exe && ./boehm_example
          CC="$C_RUNTIME_CC" make bench_exe PROFILE=release VENDORED_DEPS=1 CPPFLAGS="$C_RUNTIME_CPPFLAGS" LIBS="$C_RUNTIME_LIBS" CFLAGS="-O1 -g"
          ./bench_exe 1000000 | tee bench_ci.txt
          cd ..
          python3 - <<'PY'
          import json
          import os
          import pathlib

          sha = os.environ["SHA"]
          conf_path = pathlib.Path(".bosatsuc") / sha / "cc_conf.json"
          conf = json.loads(conf_path.read_text())
          assert "-O1" in conf["flags"], conf
          assert "-DBSTS_CI=1" in conf["flags"] or "-DBSTS_CI=1" in conf["iflags"], conf
          print(f"validated {conf_path}")
          PY
      - name: "generate and compile c code"
        run: "./bosatsuj tool transpile --input_dir test_workspace/ --input test_workspace/Bosatsu/IO/Error.bosatsu --input test_workspace/Bosatsu/Collection/Array.bosatsu --input test_workspace/Bosatsu/IO/Core.bosatsu --input test_workspace/Bosatsu/IO/Bytes.bosatsu --input test_workspace/Bosatsu/IO/Std.bosatsu c --outdir c_out --test --exe_out test_exe --cc_flag=-O0 --cc_lib=-lm"
      - name: "run generated c code"
        run: ./c_out/test_exe
      - name: "run test"
        run: |
          ./bosatsuj fetch
          mkdir c_out_lib
          ./bosatsuj test --outdir c_out_lib --cc_flag=-O0 --cc_lib=-lm
          echo "now test without a given outdir"
          ./bosatsuj test --cc_flag=-O0 --cc_lib=-lm
      - name: "run build"
        run: |
          mkdir c_out_build
          ./bosatsuj build --outdir c_out_build --main_pack Bosatsu/FibBench --exe_out fib_bench --cc_flag=-O0 --cc_lib=-lm
          ./c_out_build/fib_bench 10
          ./bosatsuj build --main_pack Bosatsu/FibBench --exe_out fib_bench_no_outdir --cc_flag=-O0 --cc_lib=-lm
          ./fib_bench_no_outdir 10
    timeout-minutes: 30
  libPublishDryRun:
    needs: testC
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v2.1.0"
      - name: "Cache sbt directories"
        uses: "actions/cache@v4"
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: "sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts') }}"
          restore-keys: |
            sbt-${{ runner.os }}-
      - name: "java ${{matrix.java}} setup"
        uses: "actions/setup-java@v5"
        with:
          distribution: "temurin"
          java-version: "${{matrix.java}}"
      - name: "install sbt"
        uses: "sbt/setup-sbt@v1"
      - name: "build assembly"
        run: 'sbt "cli/assembly"'
      - name: "dry run bosatsu publish"
        env:
          REPO_ROOT: ${{ github.workspace }}
          OUTDIR: ${{ runner.temp }}/bosatsu_lib_publish
          GIT_SHA: ${{ github.sha }}
          URI_BASE: https://example.invalid/
          PUBLISH_DRY_RUN: "1"
        run: |
          chmod +x scripts/publish_bosatsu_libs.sh
          scripts/publish_bosatsu_libs.sh
    strategy:
      matrix:
        java:
          - '17'
name: ci
on:
  pull_request: {}
